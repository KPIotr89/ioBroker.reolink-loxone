<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#283593;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="camGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64" fill="url(#bgGrad)"/>

  <!-- Camera body -->
  <g filter="url(#shadow)" transform="translate(256, 220)">
    <!-- Camera main body -->
    <rect x="-110" y="-60" width="220" height="120" rx="20" ry="20" fill="url(#camGrad)"/>

    <!-- Lens outer ring -->
    <circle cx="10" cy="0" r="48" fill="#37474f" stroke="#263238" stroke-width="3"/>

    <!-- Lens middle -->
    <circle cx="10" cy="0" r="38" fill="url(#lensGrad)"/>

    <!-- Lens inner reflection -->
    <circle cx="10" cy="0" r="22" fill="#0d47a1" opacity="0.8"/>
    <circle cx="2" cy="-8" r="8" fill="#ffffff" opacity="0.4"/>
    <circle cx="18" cy="8" r="4" fill="#ffffff" opacity="0.25"/>

    <!-- IR LEDs (left side) -->
    <circle cx="-65" cy="-20" r="6" fill="#ef5350" opacity="0.8"/>
    <circle cx="-65" cy="0" r="6" fill="#ef5350" opacity="0.8"/>
    <circle cx="-65" cy="20" r="6" fill="#ef5350" opacity="0.8"/>

    <!-- IR LEDs (right side) -->
    <circle cx="85" cy="-20" r="6" fill="#ef5350" opacity="0.8"/>
    <circle cx="85" cy="0" r="6" fill="#ef5350" opacity="0.8"/>
    <circle cx="85" cy="20" r="6" fill="#ef5350" opacity="0.8"/>

    <!-- Status LED -->
    <circle cx="-85" cy="-40" r="5" fill="url(#greenGrad)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Camera mount/base -->
    <rect x="-20" y="55" width="40" height="25" rx="4" ry="4" fill="#455a64"/>
    <rect x="-30" y="75" width="60" height="8" rx="4" ry="4" fill="#37474f"/>
  </g>

  <!-- Connection lines (camera to home) -->
  <g stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-dasharray="6,4" opacity="0.7">
    <path d="M 180 310 Q 160 360 180 390"/>
    <path d="M 330 310 Q 350 360 330 390"/>
    <path d="M 256 320 L 256 390"/>
  </g>

  <!-- Loxone house icon -->
  <g transform="translate(256, 430)">
    <!-- House body -->
    <rect x="-45" y="-20" width="90" height="50" rx="4" ry="4" fill="url(#greenGrad)" opacity="0.9"/>
    <!-- Roof -->
    <polygon points="-55,-20 0,-50 55,-20" fill="url(#greenGrad)"/>
    <!-- Door -->
    <rect x="-10" y="5" width="20" height="25" rx="2" ry="2" fill="#1b5e20"/>
    <!-- Windows -->
    <rect x="-35" y="-8" width="16" height="14" rx="2" ry="2" fill="#a5d6a7"/>
    <rect x="19" y="-8" width="16" height="14" rx="2" ry="2" fill="#a5d6a7"/>
  </g>

  <!-- "5+" badge for multi-camera -->
  <g transform="translate(420, 120)">
    <circle cx="0" cy="0" r="30" fill="#ff7043" stroke="#fff" stroke-width="3"/>
    <text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#fff">5+</text>
  </g>

  <!-- Text -->
  <text x="256" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="38" fill="#ffffff" letter-spacing="2">REOLINK</text>
  <text x="256" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="20" fill="#90caf9" letter-spacing="4">× LOXONE</text>
</svg>
